# -------------------------------------------------------------------
# -------------------------------------------------------------------
# Unified CI Workflow
# -------------------------------------------------------------------
#
# Trigger Logic:
# - PR to main: Full validation + autofix + coverage + perf
# - Push to main (after PR merge): Basic CI + draft release + multi-platform build
# - Tag (v*): Full release build
#
# Note: main branch only accepts changes via PR merge
# -------------------------------------------------------------------

name: ci
env:
  RUSTFLAGS: '-Dwarnings'
  OPENROUTER_API_KEY: ${{secrets.OPENROUTER_API_KEY}}
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - labeled
    branches:
    - main
  push:
    branches:
    - main
    tags:
    - v*
jobs:
  # Basic CI: check + build + test (runs on all triggers)
  basic-ci:
    name: Basic CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Check
      run: cargo check --workspace --all-features
    - name: Build
      run: cargo build --workspace --all-features
    - name: Test
      run: cargo test --workspace --all-features

  # Autofix: clippy + fmt (runs on PR, creates auto-fix PR)
  autofix:
    if: github.event_name == 'pull_request'
    name: Autofix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Install SQLite
      run: sudo apt-get install -y libsqlite3-dev
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: nightly
        components: clippy, rustfmt
    - name: Cargo Fmt
      run: cargo +nightly fmt --all
    - name: Cargo Clippy
      run: cargo +nightly clippy --all-features --all-targets --workspace --fix --allow-dirty -- -D warnings
    - name: Autofix
      uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8

  # Full validation: clippy + fmt + doc tests (only on PR)
  lint:
    if: github.event_name == 'pull_request'
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Clippy
      run: cargo clippy --workspace --all-features -- -D warnings
    - name: Format Check
      run: cargo fmt --check
    - name: Doc Test
      run: cargo test --doc --workspace

  # Coverage (only on PR)
  coverage:
    if: github.event_name == 'pull_request'
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov
    - name: Generate coverage
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

  # Performance benchmark (only on PR)
  perf:
    if: github.event_name == 'pull_request'
    name: Performance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Rust Toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    - name: Run performance benchmark
      run: './scripts/benchmark.sh --threshold 60 zsh rprompt'

  # Draft release (only on push to main = after PR merge)
  draft_release:
    needs: basic-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      crate_release_name: ${{ steps.set_output.outputs.crate_release_name }}
      crate_release_id: ${{ steps.set_output.outputs.crate_release_id }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - id: create_release
      name: Draft Release
      uses: release-drafter/release-drafter@v7
      with:
        config-name: release-drafter.yml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - id: set_output
      name: Export Outputs
      run: |
        echo "crate_release_id=${{ steps.create_release.outputs.id }}" >> $GITHUB_OUTPUT
        echo "crate_release_name=${{ steps.create_release.outputs.tag_name }}" >> $GITHUB_OUTPUT

  # Draft release for PR (only on PR)
  draft_release_pr:
    needs: basic-ci
    if: github.event_name == 'pull_request'
    name: Draft Release for PR
    runs-on: ubuntu-latest
    outputs:
      crate_release_name: ${{ steps.set_output.outputs.crate_release_name }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: create_release
      name: Draft Release
      uses: release-drafter/release-drafter@v7
      with:
        config-name: release-drafter.yml
        header: |
          ## ⚠️ Preview Release
          This is a preview release for PR validation. **Do not use in production.**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - id: set_output
      name: Export Outputs
      run: |
        echo "crate_release_name=${{ steps.create_release.outputs.tag_name }}" >> $GITHUB_OUTPUT

  # Full multi-platform build (on push to main or tag)
  build_release:
    needs: basic-ci
    if: >
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    name: build-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
        - binary_name: forge-x86_64-unknown-linux-musl
          binary_path: target/x86_64-unknown-linux-musl/release/forge
          cross: 'true'
          os: ubuntu-latest
          target: x86_64-unknown-linux-musl
        - binary_name: forge-aarch64-unknown-linux-musl
          binary_path: target/aarch64-unknown-linux-musl/release/forge
          cross: 'true'
          os: ubuntu-latest
          target: aarch64-unknown-linux-musl
        - binary_name: forge-x86_64-unknown-linux-gnu
          binary_path: target/x86_64-unknown-linux-gnu/release/forge
          cross: 'false'
          os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
        - binary_name: forge-aarch64-unknown-linux-gnu
          binary_path: target/aarch64-unknown-linux-gnu/release/forge
          cross: 'true'
          os: ubuntu-latest
          target: aarch64-unknown-linux-gnu
        - binary_name: forge-x86_64-apple-darwin
          binary_path: target/x86_64-apple-darwin/release/forge
          cross: 'false'
          os: macos-latest
          target: x86_64-apple-darwin
        - binary_name: forge-aarch64-apple-darwin
          binary_path: target/aarch64-apple-darwin/release/forge
          cross: 'false'
          os: macos-latest
          target: aarch64-apple-darwin
        - binary_name: forge-x86_64-pc-windows-msvc.exe
          binary_path: target/x86_64-pc-windows-msvc/release/forge.exe
          cross: 'false'
          os: windows-latest
          target: x86_64-pc-windows-msvc
        - binary_name: forge-aarch64-pc-windows-msvc.exe
          binary_path: target/aarch64-pc-windows-msvc/release/forge.exe
          cross: 'false'
          os: windows-latest
          target: aarch64-pc-windows-msvc
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      if: ${{ matrix.cross == 'false' }}
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cross Toolchain
      if: ${{ matrix.cross == 'false' }}
      uses: taiki-e/setup-cross-toolchain-action@v1
      with:
        target: ${{ matrix.target }}
    - name: Add Rust target
      if: ${{ matrix.cross == 'false' }}
      run: rustup target add ${{ matrix.target }}
    - name: Set Rust Flags
      if: '!(contains(matrix.target, ''-unknown-linux-'') || contains(matrix.target, ''-android''))'
      run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
    - name: Build Binary
      uses: ClementTsang/cargo-action@v0.0.7
      with:
        command: build --release
        args: '--target ${{ matrix.target }}'
        use-cross: ${{ matrix.cross }}
        cross-version: '0.2.5'
      env:
        RUSTFLAGS: ${{ env.RUSTFLAGS }}
        POSTHOG_API_SECRET: ${{secrets.POSTHOG_API_SECRET}}
        APP_VERSION: ${{ needs.draft_release.outputs.crate_release_name || needs.draft_release_pr.outputs.crate_release_name }}
    - name: Copy Binary
      run: cp ${{ matrix.binary_path }} ${{ matrix.binary_name }}
    - name: Upload to Release
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ needs.draft_release.outputs.crate_release_id || needs.draft_release_pr.outputs.crate_release_id }}
        file: ${{ matrix.binary_name }}
        overwrite: 'true'

  # PR multi-platform build (only on PR with label)
  build_release_pr:
    needs: draft_release_pr
    if: >
      github.event_name == 'pull_request' && 
      contains(github.event.pull_request.labels.*.name, 'ci: build all targets')
    name: build-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        include:
        - binary_name: forge-x86_64-unknown-linux-musl
          binary_path: target/x86_64-unknown-linux-musl/release/forge
          cross: 'true'
          os: ubuntu-latest
          target: x86_64-unknown-linux-musl
        - binary_name: forge-aarch64-unknown-linux-musl
          binary_path: target/aarch64-unknown-linux-musl/release/forge
          cross: 'true'
          os: ubuntu-latest
          target: aarch64-unknown-linux-musl
        - binary_name: forge-x86_64-unknown-linux-gnu
          binary_path: target/x86_64-unknown-linux-gnu/release/forge
          cross: 'false'
          os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
        - binary_name: forge-aarch64-unknown-linux-gnu
          binary_path: target/aarch64-unknown-linux-gnu/release/forge
          cross: 'true'
          os: ubuntu-latest
          target: aarch64-unknown-linux-gnu
        - binary_name: forge-x86_64-apple-darwin
          binary_path: target/x86_64-apple-darwin/release/forge
          cross: 'false'
          os: macos-latest
          target: x86_64-apple-darwin
        - binary_name: forge-aarch64-apple-darwin
          binary_path: target/aarch64-apple-darwin/release/forge
          cross: 'false'
          os: macos-latest
          target: aarch64-apple-darwin
        - binary_name: forge-x86_64-pc-windows-msvc.exe
          binary_path: target/x86_64-pc-windows-msvc/release/forge.exe
          cross: 'false'
          os: windows-latest
          target: x86_64-pc-windows-msvc
        - binary_name: forge-aarch64-pc-windows-msvc.exe
          binary_path: target/aarch64-pc-windows-msvc/release/forge.exe
          cross: 'false'
          os: windows-latest
          target: aarch64-pc-windows-msvc
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup Protobuf Compiler
      if: ${{ matrix.cross == 'false' }}
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cross Toolchain
      if: ${{ matrix.cross == 'false' }}
      uses: taiki-e/setup-cross-toolchain-action@v1
      with:
        target: ${{ matrix.target }}
    - name: Add Rust target
      if: ${{ matrix.cross == 'false' }}
      run: rustup target add ${{ matrix.target }}
    - name: Set Rust Flags
      if: '!(contains(matrix.target, ''-unknown-linux-'') || contains(matrix.target, ''-android''))'
      run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
    - name: Build Binary
      uses: ClementTsang/cargo-action@v0.0.7
      with:
        command: build --release
        args: '--target ${{ matrix.target }}'
        use-cross: ${{ matrix.cross }}
        cross-version: '0.2.5'
      env:
        RUSTFLAGS: ${{ env.RUSTFLAGS }}
        POSTHOG_API_SECRET: ${{secrets.POSTHOG_API_SECRET}}
        APP_VERSION: ${{ needs.draft_release_pr.outputs.crate_release_name }}
    - name: Copy Binary
      run: cp ${{ matrix.binary_path }} ${{ matrix.binary_name }}
    - name: Upload to Release
      uses: xresloader/upload-to-github-release@v1
      with:
        release_id: ${{ needs.draft_release_pr.outputs.crate_release_id }}
        file: ${{ matrix.binary_name }}
        overwrite: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
